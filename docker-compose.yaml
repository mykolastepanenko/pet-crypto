version: '3.9'

services:
  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: app-php
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: app-nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - main_crypto_nginx_logs:/var/log/nginx
    depends_on:
      - php
    networks:
      - app-network

  mysql:
    image: mysql:8.4
    container_name: app-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - main_crypto_mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: app-redis
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  main_crypto_mysql:
  main_crypto_nginx_logs:

networks:
  app-network:
    driver: bridge
